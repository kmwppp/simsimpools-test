<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── 기본 메타 ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="language" content="ko" />
    <meta name="geo.region" content="KR" />
    <meta name="google-adsense-account" content="ca-pub-9038000959854266" />

    <!-- 페이지별 title / description / canonical / Open Graph / Twitter 태그는 -->
    <!-- SEOMeta(react-helmet-async)가 담당하며, 사전 렌더링 시 아래 app-head 자리에 주입됩니다. -->
    <meta name="application-name" content="심심풀이" />
    <meta name="apple-mobile-web-app-title" content="심심풀이" />

    <!-- ── 전역 구조화 데이터 (WebSite + Organization) ────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://simsimpools.co.kr/#website",
          "name": "심심풀이",
          "alternateName": "심심풀이",
          "url": "https://simsimpools.co.kr",
          "description": "말로 잘 정리되지 않는 피로와 서운함, 관계의 어긋남을 생활 가까이에서 관찰해 적는 독립 콘텐츠 사이트입니다.",
          "inLanguage": "ko-KR",
          "publisher": { "@id": "https://simsimpools.co.kr/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://simsimpools.co.kr/blog?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://simsimpools.co.kr/#organization",
          "name": "심심풀이",
          "url": "https://simsimpools.co.kr",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://simsimpools.co.kr/#logo",
            "url": "https://simsimpools.co.kr/og-image.png",
            "width": 1200,
            "height": 630,
            "caption": "심심풀이 로고"
          },
          "image": { "@id": "https://simsimpools.co.kr/#logo" },
          "description": "사람들이 자주 겪지만 쉽게 설명하지 못하는 감정의 장면을 담백하게 기록하는 독립 콘텐츠 사이트입니다.",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "kmwppp@daum.net",
            "contactType": "customer service",
            "availableLanguage": "Korean"
          },
          "areaServed": "KR",
          "sameAs": [
            "https://github.com/kmwppp/simsimpools-test"
          ]
        }
      ]
    }
    </script>

    <!-- ── 파비콘 ─────────────────────────────────────────────────────── -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>"
    />

    <!-- ── 웹폰트 ─────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Google Analytics ───────────────────────────────────────────── -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQJ13C34WZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PQJ13C34WZ');
    </script>

    <!-- ── Google AdSense ─────────────────────────────────────────────── -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9038000959854266"
      crossorigin="anonymous"
    ></script>

    <!-- ── 페이지별 SEO 메타 주입 지점 (사전 렌더링) ─────────────────── -->
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
